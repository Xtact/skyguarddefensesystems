<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O.T.I.S. by SkyGuard Defense</title>
    <style>
        body {
            background-color: #000000; color: #00ffcc; font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; -webkit-touch-callout: none; -webkit-user-select: none;
        }

        #initScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 99999;
        }

        #startBtn {
            padding: 20px 40px; font-size: 22px; font-family: 'Courier New', Courier, monospace; 
            font-weight: bold; color: #00ffcc; background: rgba(0, 255, 204, 0.1); border: 2px solid #00ffcc; 
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); cursor: pointer; text-transform: uppercase;
        }

        #mainDashboard {
            display: none; 
            position: relative; width: 100%; max-width: 1400px; height: 80vh;
            justify-content: center; align-items: center;
            background-color: #050505; border: 1px solid #1a332d; overflow: hidden;
            margin-top: 5px;
        }

        /* STRICT 16:9 BOUNDING BOX FOR VIDEO AND OVERLAYS */
        #videoBounds {
            position: relative;
            width: 100%;
            max-height: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,255,204,0.05);
        }

        .back-btn {
            position: absolute; top: 15px; left: 15px; z-index: 50;
            color: #00ffcc; font-family: 'Courier New', Courier, monospace; font-size: 13px; font-weight: bold;
            text-decoration: none; border: 1px solid #00ffcc; padding: 8px 15px; background: rgba(0, 0, 0, 0.8);
            text-transform: uppercase; transition: all 0.3s ease;
        }
        .back-btn:hover { background: #00ffcc; color: #000; }

        h1 {
            color: #ff3333; letter-spacing: 2px; text-transform: uppercase; margin: 10px 0; 
            font-size: 1rem; z-index: 30; text-shadow: 0 0 10px rgba(255, 51, 51, 0.5); text-align: center;
        }

        .grid-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 204, 0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 204, 0.07) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 2;
        }

        .reticle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 50%; pointer-events: none; z-index: 3;
        }
        .reticle::before, .reticle::after { content: ''; position: absolute; background: rgba(0, 255, 204, 0.5); }
        .reticle::before { top: 50%; left: -20px; right: -20px; height: 1px; }
        .reticle::after { left: 50%; top: -20px; bottom: -20px; width: 1px; }

        #mainVideo { width: 100%; height: 100%; object-fit: cover; pointer-events: none; z-index: 1; }

        #codeStream {
            position: absolute; top: 160px; left: 15px; width: 200px; height: 250px;
            font-size: 10px; color: rgba(0, 255, 204, 0.6); overflow: hidden; pointer-events: none; z-index: 5;
            display: flex; flex-direction: column; justify-content: flex-end;
            text-shadow: 1px 1px 2px black;
        }

        .hud-left, .hud-right {
            position: absolute; display: flex; flex-direction: column; gap: 8px;
            font-size: 11px; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 5;
        }
        
        .hud-left { left: 15px; top: 70px; }
        .hud-right { right: 15px; top: 15px; text-align: right; }

        .hud-item {
            background: rgba(0, 0, 0, 0.8); padding: 5px 8px; display: flex; align-items: center; gap: 6px;
        }
        
        .status-led {
            width: 6px; height: 6px; border-radius: 50%; background-color: #00ffcc;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.7);
        }
        .led-red { background-color: #ff3333 !important; box-shadow: 0 0 10px rgba(255, 51, 51, 0.9) !important; }

        .hud-right .hud-item { flex-direction: row-reverse; }
        .insitu-tag { color: #aaaaaa; }

        #pipContainer {
            display: none; position: absolute; bottom: 15px; right: 15px; 
            width: 35%; max-width: 300px; border: 2px solid #39FF14; background: #000; z-index: 10;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.7);
        }
        #pipContainer::before {
            content: 'ISOLATION OVERRIDE'; position: absolute; top: -18px; left: 0; color: #ff3333; 
            font-size: 10px; font-weight: bold;
        }
        #xrayVideo { width: 100%; display: block; }

        #alarmOverlay {
            display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background-color: rgba(200, 0, 0, 1); color: white; padding: 8px 20px; font-size: 16px; 
            font-weight: bold; text-align: center; border: 2px solid #ffffff; z-index: 20; width: 80%; max-width: 400px;
            text-shadow: 1px 1px 0 #000;
        }
    </style>
</head>
<body>

    <div id="initScreen">
        <a href="index.html" class="back-btn" style="top: 20px; left: 20px;">&lt; RETURN TO HQ</a>
        <button id="startBtn">INITIALIZE O.T.I.S. UPLINK</button>
    </div>

    <h1>O.T.I.S. // Optical Threat Isolation System</h1>

    <div id="mainDashboard" class="dashboard-container">
        
        <a href="index.html" class="back-btn">&lt; RETURN TO HQ</a>
        
        <div class="hud-left">
            <div class="hud-item" id="sysContainer"><span class="status-led" id="led-sys"></span><span id="txt-sys">SYS: ONLINE</span></div>
            <div class="hud-item"><span class="status-led"></span><span id="altReadout">ALT: 53.0 FT</span></div>
            <div class="hud-item"><span class="status-led"></span><span id="hdgReadout">HDG: 274° W</span></div>
            <div class="hud-item" id="tgtContainer"><span class="status-led" id="led-tgt"></span><span id="txt-tgt">TGT: ACQUIRING...</span></div>
        </div>

        <div id="codeStream"></div>

        <div class="hud-right">
            <div class="hud-item"><span class="status-led"></span><span>BAT: 84%</span></div>
            <div class="hud-item"><span class="status-led"></span><span>LINK: SECURE</span></div>
            <div class="hud-item" id="camContainer"><span class="status-led" id="led-cam"></span><span id="camStatus">CAM: FPV</span></div>
            <div class="hud-item insitu-tag" id="insituContainer"><span class="status-led" id="led-insitu"></span><span id="insituStatus">CORE: INSITU LABS</span></div>
        </div>

        <div id="videoBounds">
            <video id="mainVideo" src="https://xtact.github.io/insitu-defense-matrix/insitu_poc.mp4" playsinline webkit-playsinline muted loop preload="none"></video>
            
            <div class="grid-overlay"></div>
            <div class="reticle" id="targetingReticle"></div>
            <div id="alarmOverlay">STRUCTURAL ANOMALY DETECTED</div>

            <div id="pipContainer">
                <video id="xrayVideo" src="https://xtact.github.io/insitu-defense-matrix/true_xray.mp4" playsinline webkit-playsinline muted loop preload="none"></video>
            </div>
        </div>

    </div>

    <script>
        var startBtn = document.getElementById('startBtn');
        var initScreen = document.getElementById('initScreen');
        var mainDashboard = document.getElementById('mainDashboard');
        var mainVideo = document.getElementById('mainVideo');
        var xrayVideo = document.getElementById('xrayVideo');
        var pipContainer = document.getElementById('pipContainer');
        var codeStream = document.getElementById('codeStream');
        var alarmOverlay = document.getElementById('alarmOverlay');
        var altReadout = document.getElementById('altReadout');
        var hdgReadout = document.getElementById('hdgReadout');
        
        var interceptTriggered = false;
        var step1 = false, step2 = false, step3 = false; 
        var codeInterval;

        var cvCode = [
            "cv::Mat frame; cap >> frame;",
            "cv::cvtColor(frame, gray, cv::COLOR_BGR2GRAY);",
            "cv::Canny(blur, edges, 40, 120);",
            "tensor_data = otis_model.forward();",
            "kalman_filter.predict();"
        ];

        function pushCodeLine(isThreat) {
            var line = document.createElement('div');
            if (isThreat) {
                line.innerText = "EXCEPTION: void *anomaly(0xFF) -- DEPLOY X-RAY";
                line.style.color = "#ff3333"; line.style.fontWeight = "bold";
            } else {
                var hex = "0x" + Math.random().toString(16).substring(2, 8).toUpperCase();
                line.innerText = "[" + hex + "] " + cvCode[Math.floor(Math.random() * cvCode.length)];
            }
            codeStream.appendChild(line);
            if (codeStream.childNodes.length > 15) codeStream.removeChild(codeStream.firstChild);
        }

        startBtn.addEventListener('click', function() {
            initScreen.style.display = 'none';
            mainDashboard.style.display = 'flex';

            mainVideo.play();
            
            var xPlay = xrayVideo.play();
            if (xPlay !== undefined) {
                xPlay.then(function() {
                    xrayVideo.pause();
                    xrayVideo.currentTime = 0;
                }).catch(function(err){});
            }

            if (!codeInterval) {
                codeInterval = setInterval(function() { pushCodeLine(false); }, 200);
            }
        });

        mainVideo.addEventListener("timeupdate", function() {
            var time = mainVideo.currentTime;
            
            // --- DYNAMIC TELEMETRY LOGIC (53ft to 30ft and egress) ---
            var currentAlt = 53.0;
            var currentHdg = 274;

            if (time < 1.5) {
                // Hovering phase
                currentAlt = 53.0 + (Math.random() * 0.4 - 0.2);
                currentHdg = 274 + Math.floor(Math.random() * 2 - 1);
            } else if (time >= 1.5 && time < 3.5) {
                // Swooping in phase (Drops from 53ft to 30ft over 2 seconds)
                var progress = (time - 1.5) / 2.0; 
                currentAlt = 53.0 - (23.0 * progress) + (Math.random() * 0.6 - 0.3);
                currentHdg = 274 + Math.floor(progress * 6) + Math.floor(Math.random() * 2 - 1);
            } else if (time >= 3.5 && time < 4.5) {
                // Locked on phase
                currentAlt = 30.0 + (Math.random() * 0.2 - 0.1);
                currentHdg = 280 + Math.floor(Math.random() * 2 - 1);
            } else {
                // Egress / Backing away phase
                var backProgress = (time - 4.5) / 1.5; 
                if (backProgress > 1.0) backProgress = 1.0;
                currentAlt = 30.0 + (5.0 * backProgress) + (Math.random() * 0.4 - 0.2);
                currentHdg = 280 - Math.floor(backProgress * 3) + Math.floor(Math.random() * 2 - 1);
            }

            altReadout.innerText = "ALT: " + currentAlt.toFixed(1) + " FT";
            hdgReadout.innerText = "HDG: " + currentHdg + "° W";
            // --------------------------------

            if (time < 1.0 && interceptTriggered) {
                interceptTriggered = false; step1 = false; step2 = false; step3 = false;
                
                pipContainer.style.display = "none";
                alarmOverlay.style.display = "none";
                xrayVideo.pause(); xrayVideo.currentTime = 0;
                
                document.getElementById('txt-tgt').innerText = "TGT: ACQUIRING...";
                document.getElementById('tgtContainer').style.color = "#00ffcc";
                document.getElementById('sysContainer').style.color = "#00ffcc";
                document.getElementById('camStatus').style.color = "#00ffcc";
                document.getElementById('insituStatus').style.color = "#aaaaaa"; 

                var leds = document.querySelectorAll('.status-led');
                for(var i=0; i<leds.length; i++) leds[i].classList.remove('led-red');
                document.getElementById('targetingReticle').style.borderColor = "rgba(0, 255, 204, 0.3)";
            }

            if (time >= 2.0 && !step1 && !interceptTriggered) {
                step1 = true;
                document.getElementById('led-sys').classList.add('led-red');
                document.getElementById('txt-sys').innerText = "SYS: OVERLOAD";
                document.getElementById('sysContainer').style.color = "#ff3333";
            }

            if (time >= 2.5 && !step2 && !interceptTriggered) {
                step2 = true;
                document.getElementById('led-tgt').classList.add('led-red');
                document.getElementById('txt-tgt').innerText = "TGT: DEVIATING";
                document.getElementById('tgtContainer').style.color = "#ff3333";
            }

            if (time >= 3.0 && !step3 && !interceptTriggered) {
                step3 = true;
                document.getElementById('led-insitu').classList.add('led-red');
                document.getElementById('insituStatus').style.color = "#ff3333";
            }

            if (time >= 3.5 && !interceptTriggered) { 
                interceptTriggered = true;
                
                xrayVideo.currentTime = time;
                xrayVideo.play();
                pipContainer.style.display = "block";
                
                document.getElementById('led-cam').classList.add('led-red');
                document.getElementById('camStatus').style.color = "#ff3333";
                document.getElementById('txt-tgt').innerText = "TGT: LOCK / X-RAY";
                alarmOverlay.style.display = "block";
                document.getElementById('targetingReticle').style.borderColor = "rgba(255, 51, 51, 0.8)";
                
                for(var j=0; j<5; j++) pushCodeLine(true);
            }
        });
    </script>
</body>
</html>
